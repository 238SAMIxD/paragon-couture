version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: paragon_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: paragon
      POSTGRES_PASSWORD: couture_secret
      POSTGRES_DB: paragon_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: paragon_jaeger
    environment:
      - OTEL_TRACES_SAMPLER=always_off
    ports:
      - "16686:16686" # Web UI
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver

volumes:
  postgres_data:
