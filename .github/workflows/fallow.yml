name: Fallow Codebase Intelligence

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: fallow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  fallow:
    name: Fallow Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Fallow Audit
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          comment: true
          review-comments: true
          review-guidance: true
          fail-on-issues: true
          max-comments: 50
          diff-filter: added
